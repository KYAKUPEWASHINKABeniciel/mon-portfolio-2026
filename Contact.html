<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Béni Sky</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- VARIABLES --- */
        :root {
            --violet-doux: #6c63ff;
            --violet-fonce: #534edd;
            --orange-vif: #ffa726;
            --gris-tres-fonce: #333;
            --gris-fonce: #666;
            --gris-tres-clair: #f8f8f8;
            --white: #ffffff;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--gris-tres-clair);
            font-family: 'Roboto', sans-serif;
            color: var(--gris-tres-fonce);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--white);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%;
        }

        header div a { text-decoration: none; font-size: 1.6rem; font-weight: 900; color: var(--violet-doux); }

        header nav ul { display: flex; list-style: none; gap: 25px; }
        header nav ul li a { 
            text-decoration: none; color: var(--gris-tres-fonce); 
            font-weight: 700; transition: 0.3s; 
        }
        header nav ul li a:hover, header nav ul li a.active { color: var(--violet-doux); }
        header nav ul li a.active { border-bottom: 3px solid var(--violet-doux); }

        /* --- SECTION CONTACT --- */
        .contact-main {
            padding: 6rem 5%;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 4rem;
            background: var(--white);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        /* --- INFO GAUCHE --- */
        .contact-info h2 {
            font-size: 3rem;
            color: var(--violet-fonce);
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .intro-contact {
            color: var(--gris-fonce);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--gris-tres-fonce);
        }

        .info-item i {
            color: var(--violet-doux);
            font-size: 1.4rem;
            width: 30px;
        }

        /* BOUTONS SOCIAUX DIRECTS */
        .direct-links {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-wa, .btn-tg {
            text-decoration: none;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-wa { background-color: #25D366; }
        .btn-tg { background-color: #0088cc; }

        .btn-wa:hover, .btn-tg:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            filter: brightness(1.1);
        }

        /* --- FORMULAIRE DROITE --- */
        .contact-form-box {
            background: var(--gris-tres-clair);
            padding: 2.5rem;
            border-radius: 20px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 700;
            color: var(--gris-tres-fonce);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i { color: var(--violet-doux); }

        .input-group input, .input-group textarea {
            padding: 1rem;
            border: 2px solid transparent;
            border-radius: 12px;
            background: var(--white);
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--violet-doux);
        }

        .send-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--violet-doux);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: var(--violet-fonce);
            gap: 20px;
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--violet-doux);
            padding: 3rem 5%;
            text-align: center;
            color: var(--white);
        }

        footer a { color: var(--white); font-size: 1.5rem; margin: 0 10px; transition: 0.3s; }
        footer a:hover { color: var(--orange-vif); }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .contact-container {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
            .contact-info h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div><a href="index.html">Béni Sky</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="Projets.html">Projets</a></li>
                <li><a href="Passions.html">Passions</a></li>
                <li><a href="Divertissement.html">Divertissement</a></li>
                <li><a href="Contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-main">
        <section class="contact-container">
            <div class="contact-info">
                <h2>Contactez-moi</h2>
                <p class="intro-contact">Un projet en tête ou juste envie de discuter tech ? Je suis à votre écoute.</p>
                
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lubumbashi, RDC</span>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+243 902 886 224</span>
                </div>
                
                <div class="direct-links">
                    <a href="https://wa.me/243902886224" target="_blank" class="btn-wa">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp Direct
                    </a>
                    <a href="https://t.me/243902886224" target="_blank" class="btn-tg">
                        <i class="fa-brands fa-telegram"></i> Telegram Direct
                    </a>
                </div>
            </div>

            <div class="contact-form-box">
                <form action="#">
                    <div class="input-group">
                        <label for="nom"><i class="fa-solid fa-user"></i> Nom complet</label>
                        <input type="text" id="nom" name="nom" placeholder="Ex: Jean Mukendi" required>
                    </div>
                    <div class="input-group">
                        <label for="tel"><i class="fa-solid fa-envelope"></i> Email ou Téléphone</label>
                        <input type="text" id="tel" name="tel" placeholder="Comment vous recontacter ?" required>
                    </div>
                    <div class="input-group">
                        <label for="message"><i class="fa-solid fa-pen"></i> Votre message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Décrivez votre projet ici..."></textarea>
                    </div>
                    <button type="submit" class="send-btn">
                        <span>Envoyer le message</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Béni Sky. Tous droits réservés.</p>
        <div style="margin-top: 1rem;">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </footer>

</body>
</html>
